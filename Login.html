  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; font-family:"Poppins",sans-serif; }

    body {
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#0B122B 0%,#1a2547 60%,#0f1d3d 100%);
    }

    /* Dot grid overlay */
    body::before {
      content:""; position:fixed; inset:0;
      background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);
      background-size:28px 28px; pointer-events:none;
    }

    .card {
      background:#fff; border-radius:24px;
      width:100%; max-width:420px; margin:24px 16px;
      box-shadow:0 40px 80px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.06);
      position:relative; z-index:1; overflow:hidden;
    }

    /* Rainbow stripe top */
    .card-stripe {
      height:4px;
      background:linear-gradient(90deg,#2563EB,#7C3AED,#EC4899,#F97316);
    }

    .card-body { padding:40px 36px 36px; }

    /* Logo */
    .logo-wrap { text-align:center; margin-bottom:32px; }
    .logo-wrap img { height:90px; }

    /* Signed-in account pill */
    .account-section { margin-bottom:24px; }
    .account-label {
      font-size:11px; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; color:#6B7280; margin-bottom:8px;
    }
    .account-pill {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; border:1.5px solid #E5E9F5;
      border-radius:12px; background:#F8F9FF;
    }
    .account-avatar {
      width:42px; height:42px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,#2563EB,#7C3AED);
      color:#fff; font-weight:700; font-size:16px;
      display:flex; align-items:center; justify-content:center;
    }
    .account-name  { font-weight:700; font-size:14px; color:#0B122B; }
    .account-email { font-size:12px; color:#6B7280; }

    /* Warning */
    .warning {
      display:none; background:#FFF7ED; border:1px solid #FED7AA;
      color:#C2410C; border-radius:10px; padding:10px 14px;
      font-size:12px; margin-bottom:16px; line-height:1.5;
    }
    .warning.show { display:block; }

    /* Google SSO button */
    .btn-google {
      display:flex; align-items:center; justify-content:center; gap:12px;
      width:100%; padding:13px 20px; margin-bottom:16px;
      background:#fff; border:1.5px solid #E5E9F5; border-radius:12px;
      font-size:15px; font-weight:600; color:#0B122B;
      cursor:pointer; transition:box-shadow .2s, border-color .2s;
      text-decoration:none;
    }
    .btn-google:hover {
      box-shadow:0 4px 20px rgba(0,0,0,.1); border-color:#BFDBFE;
    }
    .btn-google svg { flex-shrink:0; }

    /* Divider */
    .divider {
      display:flex; align-items:center; gap:12px;
      margin-bottom:16px; color:#9CA3AF; font-size:12px; font-weight:500;
    }
    .divider::before, .divider::after {
      content:""; flex:1; height:1px; background:#E5E9F5;
    }

    /* Main continue button */
    .btn-continue {
      width:100%; padding:14px; margin-bottom:0;
      background:linear-gradient(135deg,#2563EB,#7C3AED);
      color:#fff; border:none; border-radius:12px;
      font-size:15px; font-weight:700; cursor:pointer;
      transition:opacity .2s, transform .1s; letter-spacing:.02em;
    }
    .btn-continue:hover   { opacity:.9; }
    .btn-continue:active  { transform:scale(.98); }
    .btn-continue:disabled{ opacity:.45; cursor:not-allowed; }

    /* Footer note */
    .footer-note {
      text-align:center; font-size:11px; color:#9CA3AF;
      margin-top:20px; line-height:1.6;
    }

    /* Loading state */
    .spinner-inline {
      display:inline-block; width:16px; height:16px;
      border:2px solid rgba(255,255,255,.4); border-top-color:#fff;
      border-radius:50%; animation:spin .6s linear infinite;
      vertical-align:middle; margin-right:6px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>

  var BASE_URL   = "<?= baseUrl ?>";

  // Allowed domain — warn if account doesn't match
  var SCHOOL_DOMAINS = ["affinitylp.co.uk", "deferrers.com"];
  var SCHOOL_DOMAIN = SCHOOL_DOMAINS[0]; // kept for compatibility

  (function init() {
    var initials = USER_EMAIL.slice(0, 2).toUpperCase();
    var prefix   = USER_EMAIL.split('@')[0];

    document.getElementById('avatar').textContent        = initials;
    document.getElementById('account-name').textContent  = prefix;
    document.getElementById('account-email').textContent = USER_EMAIL;

    // Warn if not a school account
    var isSchoolAccount = SCHOOL_DOMAINS.some(function(d){ return USER_EMAIL.indexOf(d) !== -1; });
    if (!isSchoolAccount) {
      document.getElementById('warning').classList.add('show');
      document.getElementById('account-pill').style.borderColor = '#fcd34d';
    }

    // If teacher has already been through login this session and was on the dashboard,
    // skip login and go straight back to the dashboard
    if (sessionStorage.getItem('dashboardAccess') === '1') {
      var dashUrl = BASE_URL.replace('?confirmed=1', '?confirmed=1&view=dashboard&via=refresh');
      window.top.location.href = dashUrl;
      return;
    }
  })();

  function continueToPortal() {
    var btn = document.getElementById('btn-continue');
    btn.disabled = true;
    btn.innerHTML = '<span>Loading…</span>';
    window.top.location.href = BASE_URL;
  }

  function switchAccount() {
    // Signing out of a Google account from within an iframe isn't possible directly.
    // Best approach: open Google's account chooser in a new tab.
    window.open('https://accounts.google.com/AccountChooser', '_blank');
  }


  // On load — check if user is already signed in via Google
  (function onLoad() {
    var name  = typeof USER_NAME  !== "undefined" ? USER_NAME  : "";
    var email = typeof USER_EMAIL !== "undefined" ? USER_EMAIL : "";

    if (email && email !== "") {
      // User is signed in — show account pill and continue button
      document.getElementById("account-section").style.display = "block";
      document.getElementById("btn-google").style.display      = "none";
      document.getElementById("divider").style.display         = "flex";
      document.getElementById("btn-continue").style.display    = "block";

      document.getElementById("avatar").textContent        = USER_EMAIL.slice(0,2).toUpperCase();
      document.getElementById("account-name").textContent  = USER_NAME || USER_EMAIL;
      document.getElementById("account-email").textContent = USER_EMAIL;

      // Warn if non-school account
      var domain = USER_EMAIL.split("@")[1] || "";
      var personal = ["gmail.com","yahoo.com","hotmail.com","outlook.com","icloud.com"];
      if (personal.indexOf(domain) > -1) {
        document.getElementById("warning").classList.add("show");
      }
    } else {
      // Not signed in — show Google button only
      document.getElementById("account-section").style.display = "none";
      document.getElementById("btn-google").style.display      = "flex";
      document.getElementById("divider").style.display         = "none";
      document.getElementById("btn-continue").style.display    = "none";
    }
  })();
</script>
</body>
</html>
